; PlatformIO Project Configuration File

[platformio]
default_envs = gen2_nano
; Optional local overlay (uncomment for local-only overrides):
; extra_configs = platformio.local.ini

[env]
framework = arduino
upload_speed = 115200
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0
    cameronbrooks11/CRUMBS @ ^0.12.4
    cameronbrooks11/bread-crumbs-contracts @ ^0.4.5
    br3ttb/PID @ ^1.2.1
    https://github.com/adafruit/MAX6675-library.git
build_flags =
    -DCRUMBS_MAX_HANDLERS=12
    ; override for flashed board address:
    ; -DI2C_ADR=10
    ; enable debug serial output:
    ; -DSLICE_DEBUG=1
    ; boot with the command watchdog armed (ms); default: boots disarmed:
    ; -DRLHT_WATCHDOG_BOOT_MS=5000

[env:nano_base]
platform = atmelavr
board = nanoatmega328new

[env:nanoevery_base]
platform = atmelmegaavr
board = nano_every

[env:gen1_nano]
extends = env:nano_base
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=1

[env:gen2_nano]
extends = env:nano_base
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=2

[env:gen1_nanoevery]
extends = env:nanoevery_base
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=1

[env:gen2_nanoevery]
extends = env:nanoevery_base
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=2
